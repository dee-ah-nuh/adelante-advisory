<html lang="en">

<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#ECE5D8;color:#1F2B23;font-family:"Inter Tight",system-ui,sans-serif;padding:48px;min-height:100vh}
.page-head{max-width:1600px;margin:0 auto 64px;border-bottom:1px solid rgba(31,43,35,0.15);padding-bottom:32px}
.page-head h1{font-family:"Instrument Serif",serif;font-size:72px;font-weight:400;letter-spacing:-1.5px;line-height:1}
.page-head h1 em{color:#C45A3B}
.page-head p{font-family:"Instrument Serif",serif;font-style:italic;font-size:22px;color:#3D4A40;margin-top:14px;max-width:760px}
.page-head .meta{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7A7568;margin-top:24px;display:flex;gap:28px;flex-wrap:wrap}
.page-head .meta a{color:#C45A3B;text-decoration:none;border-bottom:1px solid rgba(196,90,59,0.3)}

.section{max-width:1600px;margin:0 auto 80px}
.section-head{margin-bottom:28px;display:flex;align-items:baseline;justify-content:space-between;gap:24px;flex-wrap:wrap}
.section-head h2{font-family:"Instrument Serif",serif;font-size:44px;font-weight:400;letter-spacing:-1px}
.section-head h2 em{color:#C45A3B}
.section-head .sub{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7A7568}
.section-head .lede{font-family:"Instrument Serif",serif;font-style:italic;font-size:18px;color:#3D4A40;max-width:640px;flex:1;min-width:300px}

/* Scaled thumbnails — actual posts render at full dimensions, we scale them */
.grid{display:grid;gap:32px}
.grid-sq{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
.grid-ls{grid-template-columns:repeat(auto-fill,minmax(480px,1fr))}
.grid-banner{grid-template-columns:1fr}
.grid-icons{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}

.thumb{background:#F5F1EA;border:1px solid rgba(31,43,35,0.15);border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:16px}
.thumb-canvas{overflow:hidden;background:#F5F1EA;border:1px solid rgba(31,43,35,0.1);aspect-ratio:auto;position:relative}
.thumb-inner{transform-origin:top left;position:absolute;top:0;left:0}
.thumb-meta{display:flex;justify-content:space-between;align-items:baseline;gap:12px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7A7568}
.thumb-label{font-family:"Instrument Serif",serif;font-style:italic;font-size:18px;color:#1F2B23;letter-spacing:-0.3px;text-transform:none}

.icon-card{background:#F5F1EA;border:1px solid rgba(31,43,35,0.15);border-radius:4px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px}
.icon-card svg{width:56px;height:56px}
.icon-card .name{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7A7568}

.download-note{max-width:1600px;margin:0 auto 48px;padding:28px 32px;background:#1F2B23;color:#F5F1EA;border-radius:4px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
.download-note .title{font-family:"Instrument Serif",serif;font-style:italic;font-size:26px}
.download-note .sub{font-family:"Inter Tight",sans-serif;font-size:14px;color:rgba(245,241,234,0.7);max-width:500px;line-height:1.5;margin-top:4px}
.download-note .cta{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#F5D5C7;border:1px solid rgba(245,213,199,0.5);padding:10px 16px;border-radius:4px}

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div class="page-head">
  <h1>Adelante Advisory — <em>Social kit.</em></h1>
  <p>25 Instagram posts · 10 Zoom backgrounds · 1 LinkedIn banner · 7 reusable icons. Editorial warmth, bilingual, plug-and-play.</p>
  <div class="meta">
    <span>COLORS · #F5F1EA / #1F2B23 / #C45A3B</span>
    <span>TYPE · Instrument Serif / Inter Tight / JetBrains Mono</span>
    <a href="../README.md">↗ Full design system</a>

<div id="root"></div>

<script type="text/babel" data-presets="react">
// Adelante Advisory — Instagram kit content & shared primitives
// All 25 posts, 10 zoom backgrounds, 1 LinkedIn banner. Bilingual.

const BG = '#F5F1EA', BG_ALT = '#ECE5D8', CARD = '#FCF8F1';
const INK = '#1F2B23', INK_SOFT = '#3D4A40', MUTED = '#7A7568';
const ACCENT = '#C45A3B', BORDER = 'rgba(31,43,35,0.15)';
const SERIF = '"Instrument Serif", "Times New Roman", serif';
const SANS = '"Inter Tight", -apple-system, system-ui, sans-serif';
const MONO = '"JetBrains Mono", "SF Mono", ui-monospace, monospace';

// Reusable marks ------------------------------------------------------------
const Logo = ({ size = 28, color = INK }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" style={{flexShrink:0}}>
    <circle cx="16" cy="16" r="15" fill="none" stroke={color} strokeWidth="1.4"/>
    <path d="M8 19 L16 9 L24 19" fill="none" stroke={ACCENT} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx="16" cy="9" r="2.2" fill={ACCENT}/>
  </svg>
);

const Wordmark = ({ light = false, scale = 1 }) => (
  <div style={{display:'flex', alignItems:'center', gap:10*scale}}>
    <Logo size={26*scale} color={light ? BG : INK}/>
    <span style={{fontFamily:SERIF, fontSize:22*scale, letterSpacing:-0.3, color: light ? BG : INK}}>Adelante</span>
    <span style={{fontFamily:MONO, fontSize:10*scale, color: light ? 'rgba(245,241,234,0.6)' : MUTED, letterSpacing:1.5, marginTop:4*scale}}>ADVISORY</span>
  </div>
);

const Eyebrow = ({ children, color = MUTED, size = 12 }) => (
  <div style={{fontFamily:MONO, fontSize:size, letterSpacing:2, textTransform:'uppercase', color, display:'flex', alignItems:'center', gap:10}}>
    <span style={{width:24, height:1, background:color, opacity:0.6}}/>
    {children}
  </div>
);

// Textured paper background (subtle noise using inline svg)
const paperTexture = `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.17 0 0 0 0 0.14 0 0 0 0.045 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>")`;

// Decorative ornaments -------------------------------------------------------
const Ornament = ({ kind = 'dots' }) => {
  if (kind === 'dots') return (
    <div style={{display:'flex', gap:6}}>
      {[0,1,2].map(i => <span key={i} style={{width:4, height:4, borderRadius:'50%', background:ACCENT}}/>)}
    </div>
  );
  if (kind === 'rule') return <div style={{width:48, height:1, background:INK, opacity:0.3}}/>;
  if (kind === 'arrow') return <span style={{color:ACCENT, fontSize:20}}>→</span>;
  if (kind === 'star') return (
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1 L9 6 L14 7 L9 8 L8 13 L7 8 L2 7 L7 6 Z" fill={ACCENT}/></svg>
  );
  return null;
};

// Number stamp — for numbered carousels & steps
const NumberStamp = ({ n, color = ACCENT }) => (
  <div style={{fontFamily:MONO, fontSize:11, letterSpacing:2, color, textTransform:'uppercase'}}>{n}</div>
);

// Post frame — wraps each post at exact pixel dimensions
const PostFrame = ({ w, h, bg = BG, children, id, label }) => (
  <div data-post-id={id} data-post-label={label} style={{
    width:w, height:h, background:bg, position:'relative', overflow:'hidden',
    fontFamily:SANS, color:INK, boxShadow:'0 2px 12px rgba(31,43,35,0.08)',
    flexShrink:0,
  }}>
    {children}
  </div>
);

// Footer bar used across most posts
const PostFooter = ({ light = false, handle = '@adelanteadvisory', right = 'adelanteadvisory.com' }) => (
  <div style={{
    position:'absolute', left:64, right:64, bottom:52,
    display:'flex', justifyContent:'space-between', alignItems:'center',
    fontFamily:MONO, fontSize:12, letterSpacing:1.5, textTransform:'uppercase',
    color: light ? 'rgba(245,241,234,0.7)' : MUTED,
  }}>
    <div style={{display:'flex', alignItems:'center', gap:10}}>
      <Logo size={18} color={light ? BG : INK}/>
      <span>{handle}</span>
    </div>
    <span>{right}</span>
  </div>
);

// Bilingual divider label
const BiRule = ({ en, es, color = MUTED }) => (
  <div style={{display:'flex', alignItems:'center', gap:14, fontFamily:MONO, fontSize:10, letterSpacing:2, textTransform:'uppercase', color}}>
    <span>{en}</span>
    <span style={{width:24, height:1, background:color, opacity:0.5}}/>
    <span style={{fontStyle:'italic', textTransform:'none', fontFamily:SERIF, fontSize:13, letterSpacing:0}}>{es}</span>
  </div>
);

Object.assign(window, {
  BG, BG_ALT, CARD, INK, INK_SOFT, MUTED, ACCENT, BORDER,
  SERIF, SANS, MONO, paperTexture,
  Logo, Wordmark, Eyebrow, Ornament, NumberStamp, PostFrame, PostFooter, BiRule,
});


// ============================================================

    <div style={{position:'absolute', bottom:130, left:64, right:64, fontFamily:SERIF, fontStyle:'italic', fontSize:30, color:INK_SOFT, maxWidth:720, lineHeight:1.3}}>
      Career coaching for Latin Americans<br/>navigating US corporate life.
    </div>
    <PostFooter/>
  </PostFrame>
);

// ============================================================
// POST 02 — Stat hook (IG 1:1)
// ============================================================
const Post02 = () => (
  <PostFrame w={1080} h={1080} bg={BG_ALT} id="02" label="Stat hook — applications">
    <div style={{position:'absolute', top:64, left:64, right:64, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
      <Eyebrow>Data · Datos</Eyebrow>
      <Ornament kind="dots"/>
    </div>
    <div style={{position:'absolute', top:200, left:64, right:64, textAlign:'center'}}>
      <div style={{fontFamily:SERIF, fontSize:280, lineHeight:1, letterSpacing:-8, color:ACCENT, fontWeight:400}}>250+</div>
    </div>
    <div style={{position:'absolute', top:540, left:64, right:64, textAlign:'center'}}>
      <div style={{fontFamily:SERIF, fontSize:46, fontStyle:'italic', color:INK, lineHeight:1.2, marginBottom:14}}>
        average applications before<br/>a first US offer.
      </div>
      <div style={{fontFamily:SERIF, fontStyle:'italic', fontSize:26, color:INK_SOFT, marginTop:28}}>
        Promedio de aplicaciones antes de tu primera oferta.
      </div>
    </div>
    <div style={{position:'absolute', bottom:170, left:64, right:64, textAlign:'center', fontFamily:MONO, fontSize:13, color:MUTED, letterSpacing:1.5}}>
      YOU ARE NOT FAILING. <span style={{color:ACCENT}}>★</span> NO ESTÁS FRACASANDO.
    </div>
    <PostFooter/>
  </PostFrame>

// ============================================================
// POST 03 — Myth vs Truth (IG 4:5)
// ============================================================
const Post03 = () => (
  <PostFrame w={1080} h={1350} bg={BG} id="03" label="Myth vs truth — networking">
    <div style={{position:'absolute', top:64, left:64, right:64}}>
      <BiRule en="Myth vs Truth" es="Mito vs Verdad"/>
    </div>
    <div style={{position:'absolute', top:160, left:64, right:64}}>
      <div style={{background:'transparent', border:`1px solid ${BORDER}`, borderRadius:4, padding:'32px 36px', marginBottom:24, position:'relative'}}>
        <div style={{position:'absolute', top:-10, left:24, background:BG, padding:'0 12px', fontFamily:MONO, fontSize:11, letterSpacing:2, color:MUTED, textTransform:'uppercase'}}>Myth · Mito</div>
        <div style={{fontFamily:SERIF, fontSize:42, fontStyle:'italic', color:INK_SOFT, lineHeight:1.2, textDecoration:'line-through', textDecorationColor:'rgba(196,90,59,0.5)', textDecorationThickness:2}}>
          "Networking is for extroverts who love small talk."
        </div>
      </div>
      <div style={{background:INK, color:BG, borderRadius:4, padding:'36px 36px', position:'relative'}}>
        <div style={{position:'absolute', top:-10, left:24, background:ACCENT, color:BG, padding:'4px 12px', fontFamily:MONO, fontSize:11, letterSpacing:2, textTransform:'uppercase'}}>Truth · Verdad</div>
        <div style={{fontFamily:SERIF, fontSize:48, lineHeight:1.15, letterSpacing:-0.8, marginTop:6}}>

        </div>
        <div style={{fontFamily:SERIF, fontStyle:'italic', fontSize:26, color:'rgba(245,241,234,0.75)', marginTop:24, lineHeight:1.3}}>
          Hacer networking es solo una conversación, repetida.
        </div>
      </div>
    </div>
    <div style={{position:'absolute', bottom:180, left:64, right:64, fontFamily:SERIF, fontStyle:'italic', fontSize:26, color:INK_SOFT, textAlign:'center'}}>
      Start with one coffee chat. <span style={{color:ACCENT}}>→</span>
    </div>
    <PostFooter/>
  </PostFrame>

// ============================================================
// POST 04 — Carousel cover: "5 things I wish I knew" (4:5)
// ============================================================
const Post04 = () => (
  <PostFrame w={1080} h={1350} bg={BG} id="04" label="Carousel cover — 5 things">
    <div style={{position:'absolute', top:64, left:64, right:64, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
      <Eyebrow>Carousel · 01 / 06</Eyebrow>
      <div style={{fontFamily:MONO, fontSize:12, color:MUTED, letterSpacing:1.5}}>SWIPE →</div>
    </div>
    <div style={{position:'absolute', top:260, left:64, right:64}}>
      <div style={{fontFamily:SERIF, fontSize:160, lineHeight:0.95, letterSpacing:-5, color:INK, fontWeight:400}}>

        <span style={{fontStyle:'italic'}}>first US job.</span>
      </div>
    </div>
    <div style={{position:'absolute', bottom:180, left:64, right:64, fontFamily:SERIF, fontStyle:'italic', fontSize:32, color:INK_SOFT}}>
      5 cosas que hubiera querido saber antes de mi primer trabajo en EE.UU.
    </div>
    <PostFooter/>

);

// Carousel slides 05-08 use shared layout
const CarouselSlide = ({ n, total, titleEn, titleEs, bodyEn, bodyEs, id, label }) => (
  <PostFrame w={1080} h={1350} bg={BG} id={id} label={label}>
